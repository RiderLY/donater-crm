<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root { --primary:#7c3aed; --bg:#0b0b0f; --card:#16161e; --text:#ececed; --border:#2a2a3f; --green:#10b981;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:var(--bg);color:var(--text);display:flex;justify-content:center;align-items:center;min-height:100vh;}

#auth-screen{width:380px;background:var(--card);padding:40px;border-radius:24px;border:1px solid var(--border);}
#app{display:none;width:100%;max-width:1200px;padding:40px;}

input{width:100%;margin-bottom:15px;padding:12px;border-radius:12px;background:#111;border:1px solid var(--border);color:white;}
button{padding:12px;border:none;border-radius:12px;cursor:pointer;font-weight:700;}
.btn{background:var(--primary);color:white;}

.table-box{background:var(--card);border-radius:20px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
td,th{padding:14px;border-bottom:1px solid var(--border);}
</style>
</head>

<body>

<div id="auth-screen">
<h2>STELLAR CRM</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Пароль">
<input id="invite-code" placeholder="Код">
<button class="btn" onclick="handleAuth()">Войти</button>
</div>

<div id="app">
<input id="search" placeholder="Поиск..." oninput="loadData()">
<button onclick="addDonator()">+ Добавить</button>
<button onclick="logout()">Выход</button>

<div class="table-box">
<table>
<tbody id="tbody"></tbody>
</table>
</div>
</div>

<div id="panel" style="position:fixed;right:-400px;top:0;width:300px;height:100%;background:#111;padding:20px;">
<h3 id="pName"></h3>
<input id="eName">
<input id="eNick">
<input id="eTG">
<input id="eTT">
<input id="eBD" type="date">
<button onclick="saveData()">Сохранить</button>
</div>

<script>
const SUPABASE_URL = "https://ltrglnjbsyoelkagqbbh.supabase.co";
const SUPABASE_KEY = "ТВОЙ_KEY";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const MONTHS = ["Янв","Фев","Мар","Апр","Май","Июн","Июл","Авг","Сен","Окт","Ноя","Дек"];

let currentId = null;

const getCurMonth = () => MONTHS[new Date().getMonth()];

async function handleAuth(){
  const email = emailInput.value;
  const password = pass.value;
  await db.auth.signInWithPassword({email,password});
  checkUser();
}

async function checkUser(){
  const {data:{user}} = await db.auth.getUser();
  if(user){
    authScreen.style.display="none";
    app.style.display="block";
    loadData();
  }
}
checkUser();

async function loadData(){
  const q = search.value.toLowerCase();

  const {data} = await db.from("donators").select("*");
  if(!data) return;

  const tbody = document.getElementById("tbody");
  tbody.innerHTML="";

  data.filter(d=>!q || d.name?.toLowerCase().includes(q))
  .forEach(d=>{
    const tr = document.createElement("tr");

    const monthVal = (d.history||{})[getCurMonth()]||0;

    tr.innerHTML=`
      <td>${d.name}</td>
      <td>${monthVal}€</td>
      <td>${d.total||0}€</td>
      <td>
        <button onclick="addMoney('${d.id}',50)">+50</button>
        <button onclick="openPanel('${d.id}')">✎</button>
        <button onclick="deleteDonator('${d.id}')">✕</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

async function addDonator(){
  const name = search.value;
  if(!name) return;

  const {data:{user}} = await db.auth.getUser();

  await db.from("donators").insert([{
    name,
    total:0,
    history:{},
    user_id:user.id
  }]);

  loadData();
}

async function openPanel(id){
  currentId = id;

  const {data} = await db.from("donators").select("*").eq("id",id).single();

  pName.innerText = data.name;
  eName.value = data.name||"";
  eNick.value = data.nick||"";
  eTG.value = data.telegram||"";
  eTT.value = data.tiktok||"";
  eBD.value = data.birthday||"";

  panel.style.right="0";
}

async function saveData(){
  await db.from("donators").update({
    name:eName.value,
    nick:eNick.value,
    telegram:eTG.value,
    tiktok:eTT.value,
    birthday:eBD.value
  }).eq("id",currentId);

  panel.style.right="-400px";
  loadData();
}

async function addMoney(id,amount){
  const {data} = await db.from("donators").select("*").eq("id",id).single();

  const month = getCurMonth();
  const history = data.history||{};
  history[month]=(history[month]||0)+amount;

  await db.from("donators").update({
    total:(data.total||0)+amount,
    history
  }).eq("id",id);

  loadData();
}

async function deleteDonator(id){
  await db.from("donators").delete().eq("id",id);
  loadData();
}

const logout = ()=>db.auth.signOut().then(()=>location.reload());
</script>

</body>
</html>
