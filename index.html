<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Stellar CRM FINAL</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{background:#0b0b0f;color:white;font-family:Inter;margin:0}
#auth,#app{max-width:900px;margin:auto;padding:30px}
input{width:100%;padding:10px;margin:10px 0;background:#111;border:1px solid #333;color:white;border-radius:8px}
button{padding:10px;border:none;border-radius:8px;background:#7c3aed;color:white;cursor:pointer}
table{width:100%;margin-top:20px;border-collapse:collapse}
td,th{padding:10px;border-bottom:1px solid #222}
</style>
</head>
<body>

<div id="auth">
<h2>Вход</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Пароль">
<input id="invite" placeholder="Invite code">
<button onclick="auth()">Войти</button>
</div>

<div id="app" style="display:none">
<h2>CRM 😈</h2>
<button onclick="addDonator()">+ Донатер</button>
<button onclick="logout()">Выход</button>

<input id="search" placeholder="Поиск..." oninput="load()">

<table>
<thead>
<tr><th>Имя</th><th>Месяц</th><th>Всего</th></tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<script>
const SUPABASE_URL="https://ltrglnjbsyokelkgqbbh.supabase.co";
const SUPABASE_ANON_KEY="ТВОЙ_KEY";
const INVITE="STELLAR-PRO-2026";

const db=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

const MONTHS=["Янв","Фев","Мар","Апр","Май","Июн","Июл","Авг","Сен","Окт","Ноя","Дек"];
const curMonth=()=>MONTHS[new Date().getMonth()];

async function auth(){
const email=emailInput.value;
const password=passInput.value;
const invite=inviteInput.value;

let {error}=await db.auth.signInWithPassword({email,password});

if(error){
if(invite!==INVITE)return alert("Нет доступа");

await db.auth.signUp({email,password});
await db.auth.signInWithPassword({email,password});
}

checkUser();
}

async function checkUser(){
const {data:{user}}=await db.auth.getUser();

if(user){
auth.style.display="none";
app.style.display="block";
load();
}
}
checkUser();

function logout(){
db.auth.signOut().then(()=>location.reload());
}

async function load(){
const q=search.value.toLowerCase();

const {data:{user}}=await db.auth.getUser();
if(!user)return;

const {data,error}=await db.from("donators")
.select("*")
.eq("user_id",user.id);

if(error||!data)return;

tbody.innerHTML="";

data.filter(d=>!q||d.name?.toLowerCase().includes(q))
.forEach(d=>{
const m=(d.history||{})[curMonth()]||0;

tbody.innerHTML+=`
<tr>
<td>${d.name}</td>
<td>${m}€ <button onclick="addMoney('${d.id}',10)">+10</button></td>
<td>${d.total||0}€</td>
</tr>`;
});
}

async function addMoney(id,amt){
const {data}=await db.from("donators").select("history").eq("id",id).single();
if(!data)return;

const h=data.history||{};
const m=curMonth();

h[m]=(Number(h[m])||0)+amt;

const total=Object.values(h).map(v=>Number(v)||0).reduce((a,b)=>a+b,0);

await db.from("donators").update({history:h,total}).eq("id",id);

load();
}

async function addDonator(){
const name=prompt("Имя");
if(!name)return;

const {data:{user}}=await db.auth.getUser();
if(!user)return;

await db.from("donators").insert([{name,total:0,history:{},user_id:user.id}]);

load();
}
</script>

</body>
</html>
