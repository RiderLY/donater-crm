<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar CRM</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{background:#0f0f14;color:white;}

.auth-container{height:100vh;display:flex;justify-content:center;align-items:center;}
.auth-box{background:#181825;padding:30px;border-radius:16px;width:320px;}

input{width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:none;background:#232336;color:white;}
button{padding:10px;background:#7c3aed;border:none;border-radius:8px;color:white;cursor:pointer;}

.app{display:none;padding:20px;}

table{width:100%;border-collapse:collapse;background:#181825;}
td,th{padding:10px;border-bottom:1px solid #2a2a3f;}

.panel{position:fixed;right:-400px;top:0;width:320px;height:100%;background:#111;padding:20px;transition:.3s;}
</style>
</head>

<body>

<!-- AUTH -->
<div class="auth-container" id="auth">
<div class="auth-box">
<h2 id="authTitle">Вход</h2>

<input id="email">
<input id="password" type="password">

<button onclick="handleAuth()">Продолжить</button>

<div onclick="toggleMode()" style="margin-top:10px;cursor:pointer;color:#aaa;">
Переключить режим
</div>
</div>
</div>

<!-- APP -->
<div class="app" id="app">

<div style="display:flex;gap:10px;margin-bottom:10px;">
<input id="search" placeholder="Имя..." oninput="loadData()">
<button onclick="addDonator()">+ Добавить</button>
<button onclick="logout()">Выход</button>
</div>

<table>
<thead>
<tr>
<th>VIP</th>
<th>Имя</th>
<th>Месяц</th>
<th>Всего</th>
<th></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<!-- PANEL -->
<div class="panel" id="panel">
<h3 id="pName"></h3>

<input id="eName">
<input id="eNick">
<input id="eTG">
<input id="eTT">
<input id="eBD" type="date">

<button onclick="saveData()">Сохранить</button>
</div>

<script>
const SUPABASE_URL = "https://ltrglnjbsyoelkagqbbh.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0cmdsbmpic3lvZWxrYWdxYmJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNzgyNDksImV4cCI6MjA5MDc1NDI0OX0.VhZiD9OVDfv3nlfYysBNXPsax4RkevErwWImMlqW9BM";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let isLogin = true;
let currentId = null;

const MONTHS = ["Янв","Фев","Мар","Апр","Май","Июн","Июл","Авг","Сен","Окт","Ноя","Дек"];
const getMonth = () => MONTHS[new Date().getMonth()];

// AUTH

function toggleMode(){
  isLogin=!isLogin;
  authTitle.innerText = isLogin ? "Вход" : "Регистрация";
}

async function handleAuth(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(isLogin){
    const {error} = await db.auth.signInWithPassword({email,password});
    if(error) return alert(error.message);
  }else{
    const {error} = await db.auth.signUp({email,password});
    if(error) return alert(error.message);
    alert("Проверь почту");
  }

  checkUser();
}

async function checkUser(){
  const {data:{user}} = await db.auth.getUser();

  if(user){
    auth.style.display="none";
    app.style.display="block";
    loadData();
  }
}
checkUser();

function logout(){
  db.auth.signOut().then(()=>location.reload());
}

// DATA

function getVIP(total){
  if(total>=1000) return 5;
  if(total>=500) return 4;
  if(total>=250) return 3;
  if(total>=100) return 2;
  if(total>=50) return 1;
  return 0;
}

async function loadData(){
  const q = search.value.toLowerCase();

  const {data} = await db.from("donators").select("*");

  const tbody = document.getElementById("tbody");
  tbody.innerHTML="";

  data
  .filter(d=>!q || d.name?.toLowerCase().includes(q))
  .sort((a,b)=>(b.total||0)-(a.total||0))
  .forEach(d=>{

    const month = (d.history||{})[getMonth()]||0;

    const tr=document.createElement("tr");

    tr.innerHTML=`
      <td>VIP ${getVIP(d.total||0)}</td>
      <td>${d.name||""}</td>
      <td>${month}€</td>
      <td>${d.total||0}€</td>
      <td>
        <button onclick="addMoney('${d.id}',50)">+50</button>
        <button onclick="openPanel('${d.id}')">✎</button>
        <button onclick="deleteDonator('${d.id}')">✕</button>
      </td>
    `;

    tbody.appendChild(tr);
  });
}

// ADD

async function addDonator(){
  const name = search.value;
  if(!name) return;

  const {data:{user}} = await db.auth.getUser();

  await db.from("donators").insert([{
    name,
    total:0,
    history:{},
    user_id:user.id
  }]);

  search.value="";
  loadData();
}

// PANEL

async function openPanel(id){
  currentId=id;

  const {data} = await db.from("donators").select("*").eq("id",id).single();

  pName.innerText=data.name;
  eName.value=data.name||"";
  eNick.value=data.nick||"";
  eTG.value=data.telegram||"";
  eTT.value=data.tiktok||"";
  eBD.value=data.birthday||"";

  panel.style.right="0";
}

async function saveData(){
  await db.from("donators").update({
    name:eName.value,
    nick:eNick.value,
    telegram:eTG.value,
    tiktok:eTT.value,
    birthday:eBD.value
  }).eq("id",currentId);

  panel.style.right="-400px";
  loadData();
}

// MONEY

async function addMoney(id,amount){
  const {data} = await db.from("donators").select("*").eq("id",id).single();

  const month = getMonth();
  const history = data.history||{};

  history[month]=(history[month]||0)+amount;

  await db.from("donators").update({
    total:(data.total||0)+amount,
    history
  }).eq("id",id);

  loadData();
}

async function deleteDonator(id){
  if(!confirm("Удалить?")) return;
  await db.from("donators").delete().eq("id",id);
  loadData();
}
</script>

</body>
</html>
