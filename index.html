<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donators CRM PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #0f0f14; color: white; }

        /* AUTH */
        .auth-container { height: 100vh; display: none; justify-content: center; align-items: center; }
        .auth-box { background: #181825; padding: 30px; border-radius: 16px; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #2a2a3f; background: #232336; color: white; }
        
        button { padding: 10px 20px; background: #7c3aed; border: none; border-radius: 8px; color: white; cursor: pointer; transition: 0.3s; font-weight: 600; }
        button:hover { background: #6d28d9; transform: translateY(-1px); }
        .btn-add { background: #10b981; margin-right: 10px; }
        .btn-add:hover { background: #059669; }
        
        .toggle { margin-top: 15px; text-align: center; cursor: pointer; color: #aaa; font-size: 14px; }

        /* APP */
        .app { display: none; padding: 30px; max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #2a2a3f; padding-bottom: 20px; }
        .header-btns { display: flex; gap: 10px; }
        .logout { background: #3f3f46; }

        /* TABLE */
        .table-container { background: #181825; border-radius: 12px; overflow: hidden; border: 1px solid #2a2a3f; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 16px; text-align: left; border-bottom: 1px solid #2a2a3f; }
        th { background: #1f1f2e; color: #94a3b8; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: rgba(124, 58, 237, 0.05); }

        .vip { color: #a78bfa; font-weight: 800; font-size: 12px; background: rgba(167, 139, 250, 0.1); padding: 4px 8px; border-radius: 4px; }
        .open-btn { padding: 6px 12px; font-size: 12px; background: #2d2d3f; }
        a { color: #a78bfa; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="auth-container" id="auth">
    <div class="auth-box">
        <h2 id="authTitle" style="margin-bottom: 20px;">Вход</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Пароль">
        <button style="width: 100%" onclick="handleAuth()">Войти</button>
        <div class="toggle" onclick="toggleMode()" id="toggleBtn">Нет аккаунта? Регистрация</div>
    </div>
</div>

<div class="app" id="app">
    <div class="header">
        <div>
            <h1 style="font-size: 24px;">Donators CRM</h1>
            <p style="color: #64748b; font-size: 14px;">Управление базой спонсоров</p>
        </div>
        <div class="header-btns">
            <button class="btn-add" onclick="addDonator()">+ Донатер</button>
            <button class="logout" onclick="logout()">Выйти</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Уровень</th>
                    <th>Имя</th>
                    <th>Месяц</th>
                    <th>Всего</th>
                    <th>Контакты</th>
                    <th>Действие</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
const SUPABASE_URL = "YOUR_URL";
const SUPABASE_ANON_KEY = "YOUR_KEY";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let isLogin = true;

// ================= AUTH =================
function toggleMode() {
    isLogin = !isLogin;
    document.getElementById("authTitle").innerText = isLogin ? "Вход" : "Регистрация";
    document.getElementById("toggleBtn").innerText = isLogin ? "Нет аккаунта? Регистрация" : "Уже есть аккаунт? Вход";
}

async function handleAuth() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    if (!email || !password) return alert("Заполни поля");

    try {
        const { error } = isLogin 
            ? await db.auth.signInWithPassword({ email, password })
            : await db.auth.signUp({ email, password });
        if (error) throw error;
        checkUser();
    } catch (err) { alert(err.message); }
}

async function logout() { await db.auth.signOut(); checkUser(); }

async function checkUser() {
    const { data: { user } } = await db.auth.getUser();
    document.getElementById("auth").style.display = user ? "none" : "flex";
    document.getElementById("app").style.display = user ? "block" : "none";
    if (user) loadDonators();
}

checkUser();

// ================= CORE LOGIC =================
function getVIP(total) {
    const levels = [50, 150, 300, 500, 750, 1000, 1500, 2500, 4000, 6000];
    let vip = 0;
    levels.forEach((lvl, i) => { if (total >= lvl) vip = i + 1; });
    return vip;
}

async function addDonator() {
    const name = prompt("Введите имя донатера:");
    if (!name) return;

    const { error } = await db.from("donators").insert([{
        name: name,
        total: 0,
        month: 0
    }]);

    if (error) return alert("Ошибка: " + error.message);
    loadDonators();
}

async function loadDonators() {
    const { data, error } = await db.from("donators").select("*");
    if (error) return console.error(error);
    renderTable(data);
}

function renderTable(data) {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    data.sort((a, b) => (b.total || 0) - (a.total || 0));

    data.forEach(d => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td><span class="vip">VIP ${getVIP(d.total || 0)}</span></td>
            <td style="font-weight: 500;">${d.name || "Аноним"}</td>
            <td>${d.month || 0} €</td>
            <td style="color: #10b981; font-weight: 600;">${d.total || 0} €</td>
            <td>
                ${d.telegram ? `<a href="${d.telegram}" target="_blank">TG</a>` : ""}
                ${d.tiktok ? `<a href="${d.tiktok}" style="margin-left:8px" target="_blank">TT</a>` : ""}
                ${!d.telegram && !d.tiktok ? "-" : ""}
            </td>
            <td><button class="open-btn" onclick="alert('ID: ${d.id}')">Открыть</button></td>
        `;
        tbody.appendChild(tr);
    });
}
</script>
</body>
</html>
