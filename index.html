<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donater CRM</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial; background:#0f0f14; color:white; text-align:center; }
    .box { margin:20px auto; padding:20px; max-width:400px; background:#1c1c24; border-radius:12px; }
    input, button { margin:10px; padding:10px; border-radius:8px; border:none; }
    button { background:#6c5cff; color:white; cursor:pointer; }
    .hidden { display:none; }
  </style>
</head>
<body>

<h1>Donater CRM</h1>

<div id="auth" class="box">
  <h2>Вход</h2>
  <input id="email" placeholder="Email" />
  <button onclick="login()">Войти</button>
  <p id="authStatus"></p>
</div>

<div id="app" class="box hidden">
  <h2>Ты вошла 🎉</h2>
  <button onclick="logout()">Выйти</button>
  <hr>
  <textarea id="data" placeholder="Данные донатеров JSON"></textarea>
  <br>
  <button onclick="saveData()">Сохранить</button>
</div>

<script>
const SUPABASE_URL = "https://ltrglnjbsyoelkagqbbh.supabase.co";
const SUPABASE_KEY = "sb_publishable_zYB0aPTJt0yvF_dnejRENQ_jvBSNMQ4";

const REDIRECT_URL = "https://riderly.github.io/donater-crm/";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const authBox = document.getElementById("auth");
const appBox = document.getElementById("app");

async function login() {
  const email = document.getElementById("email").value;

  const { error } = await supabase.auth.signInWithOtp({
    email,
    options: {
      emailRedirectTo: REDIRECT_URL
    }
  });

  document.getElementById("authStatus").innerText =
    error ? error.message : "Проверь почту ✉️";
}

async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

async function loadData(user) {
  const { data } = await supabase
    .from("donaters")
    .select("data")
    .eq("user_id", user.id)
    .single();

  if (data) {
    document.getElementById("data").value = JSON.stringify(data.data, null, 2);
  }
}

async function saveData() {
  const user = (await supabase.auth.getUser()).data.user;
  const json = JSON.parse(document.getElementById("data").value || "{}");

  await supabase
    .from("donaters")
    .upsert({
      user_id: user.id,
      data: json
    });

  alert("Сохранено 💾");
}

supabase.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    authBox.classList.add("hidden");
    appBox.classList.remove("hidden");
    loadData(session.user);
  }
});

async function init() {
  const { data } = await supabase.auth.getSession();

  if (data.session?.user) {
    authBox.classList.add("hidden");
    appBox.classList.remove("hidden");
    loadData(data.session.user);
  }
}

init();
</script>

</body>
</html>
