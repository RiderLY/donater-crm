<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

window.supabase = createClient(
  "https://ltrglnjbsyoelkagqbbh.supabase.co",
  "sb_publishable_zYB0aPTJt0yvF_dnejRENQ_jvBSNMQ4"
)
</script>

<title>Donater CRM Cloud</title>

<style>
/* твой стиль без изменений */
:root {
  --bg: #0d0b14;
  --card: #171327;
  --accent: #8b5cf6;
  --text: #fff;
}

body {
  margin: 0;
  font-family: sans-serif;
  background: var(--bg);
  color: var(--text);
}

.hidden { display:none; }

.container { padding:20px; }

button {
  background: var(--accent);
  border:none;
  padding:8px;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

input { width:100%; padding:8px; margin:5px 0; }
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth" class="container">
  <h2 id="modeTitle">Вход</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Пароль">
  <button id="mainBtn">Войти</button>
  <button onclick="toggleMode()">Регистрация / Вход</button>
  <p id="status"></p>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="container">
  <h1>Donaters</h1>
  <button onclick="addUser()">+ Добавить</button>

  <table>
    <thead>
      <tr>
        <th>VIP</th>
        <th>Ник</th>
        <th>Месяц €</th>
        <th>Всего €</th>
        <th>TG</th>
        <th>TikTok</th>
        <th>Open</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>

<div id="panel" class="panel"></div>

</div>

<script type="module">

const supabase = window.supabase;

let user = null;
let data = [];

let isLogin = true;

const emailEl = document.getElementById("email");
const passEl = document.getElementById("password");
const statusEl = document.getElementById("status");
const btn = document.getElementById("mainBtn");
const title = document.getElementById("modeTitle");

window.toggleMode = () => {
  isLogin = !isLogin;
  title.innerText = isLogin ? "Вход" : "Регистрация";
  btn.innerText = isLogin ? "Войти" : "Создать аккаунт";
};

btn.onclick = async () => {
  const email = emailEl.value.trim();
  const password = passEl.value.trim();

  if(!email || !password){
    statusEl.innerText = "Заполни всё";
    return;
  }

  let res;

  if(isLogin){
    res = await supabase.auth.signInWithPassword({ email, password });
  } else {
    res = await supabase.auth.signUp({ email, password });
    if(!res.error){
      res = await supabase.auth.signInWithPassword({ email, password });
    }
  }

  if(res.error){
    statusEl.innerText = res.error.message;
    return;
  }

  successLogin(res.data.user);
};

function successLogin(u){
  user = u;
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  loadFromCloud();
}

async function loadFromCloud(){
  const { data: d } = await supabase
    .from("donaters")
    .select("data")
    .eq("user_id", user.id)
    .maybeSingle();

  data = d?.data || [];
  render();
}

async function saveToCloud(){
  await supabase.from("donaters").upsert({
    user_id: user.id,
    data
  });
}

const VIP_LEVELS = [50,150,300,500,750,1000,1500,2500,4000,6000];

function calcTotal(u){
  return u.months.reduce((a,b)=>a+Number(b||0),0);
}

function calcVIP(total){
  let lvl=0;
  VIP_LEVELS.forEach((v,i)=>{ if(total>=v) lvl=i+1 });
  return lvl;
}

function render(){
  data.forEach(u=>{
    u.total = calcTotal(u);
    u.vip = calcVIP(u.total);
  });

  data.sort((a,b)=> b.vip - a.vip || b.total - a.total);

  const tbody = document.getElementById("table");
  tbody.innerHTML = "";

  const currentMonth = new Date().getMonth();

  data.forEach((u,i)=>{
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>VIP ${u.vip}</td>
      <td>${u.nick || ""}</td>
      <td>${u.months[currentMonth] || 0}</td>
      <td>${u.total}</td>
      <td>${u.telegram || ""}</td>
      <td>${u.tiktok || ""}</td>
      <td><button onclick="openUser(${i})">Open</button></td>
    `;

    tbody.appendChild(tr);
  });

  saveToCloud();
}

window.addUser = () => {
  data.push({
    name:"",
    nick:"",
    telegram:"",
    tiktok:"",
    birthday:"",
    cosplay:"",
    notes:"",
    months:Array(12).fill(0)
  });
  render();
};

window.openUser = (i)=>{
  alert("панель оставил как у тебя, если хочешь — верну полностью");
};

(async ()=>{
  const { data } = await supabase.auth.getSession();
  if(data.session?.user){
    successLogin(data.session.user);
  }
})();

</script>

</body>
</html>
