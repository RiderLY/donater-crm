<!DOCTYPE html>
<html lang="ru">
<head><meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar CRM PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #7c3aed; --bg: #0f0f14; --card: #181825; --input: #232336; --text: #eee; --danger: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
.tag-btn { background: var(--input); padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid #2a2a3f; color: #888; transition: 0.2s; white-space: nowrap; user-select: none; }
        .tag-btn:hover { border-color: #666; }
        .tag-btn.active { background: rgba(124, 58, 237, 0.2); border-color: var(--primary); color: white; }

        body { background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        .flex-center { height: 100vh; display: flex; justify-content: center; align-items: center; }
        .box { background: var(--card); padding: 30px; border-radius: 16px; width: 340px; border: 1px solid #2a2a3f; }
        
        input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #2a2a3f; background: var(--input); color: white; }
        input:focus { border-color: var(--primary); outline: none; }
        
        button { padding: 12px 20px; background: var(--primary); border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: 600; transition: 0.2s; }
        button:hover { filter: brightness(1.1); }
        button.secondary { background: #2a2a3f; }
        button.danger { background: var(--danger); }

        #app { display: none; padding: 40px; max-width: 1300px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .table-container { background: var(--card); border-radius: 12px; border: 1px solid #2a2a3f; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: #666; font-size: 12px; letter-spacing: 1px; border-bottom: 1px solid #2a2a3f; }
        td { padding: 15px; border-bottom: 1px solid #232336; }

        .panel { position: fixed; right: -450px; top: 0; width: 400px; height: 100%; background: #0a0a0f; padding: 30px; transition: 0.4s; z-index: 1000; border-left: 1px solid #2a2a3f; overflow-y: auto; }
        .panel.open { right: 0; }
        
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: var(--primary); display: none; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay"></div>

<div id="auth-screen" class="flex-center">
    <div class="box">
        <h2 id="authTitle" style="margin-bottom:20px; text-align:center">Stellar PRO</h2>
        <input id="email" type="email" placeholder="Email">
        <input id="pass" type="password" placeholder="Пароль">
        <button id="authBtn" style="width:100%" onclick="handleAuth()">Продолжить</button>
        <p id="toggleText" onclick="toggleAuth()" style="text-align:center; margin-top:15px; font-size:12px; color:#666; cursor:pointer">Нет аккаунта? Создать</p>
    </div>
</div>

<div id="app">
    <div class="header">
        <h1>Dashboard</h1>
        <div style="display:flex; gap:10px; align-items:center">
            <span id="userLabel" style="font-size:13px; color:#666"></span>
            <button class="secondary" onclick="logout()">Выйти</button>
        </div>
    </div>

    <div id="statsBoard" style="display:flex; gap:20px; margin-bottom:25px;">
        <div style="flex:1; background:var(--card); padding:20px; border-radius:12px; border:1px solid #2a2a3f;">
            <div style="font-size:12px; color:#666; margin-bottom:5px">Всего спонсоров</div>
            <div id="statCount" style="font-size:24px; font-weight:bold; color:white">0</div>
        </div>
        <div style="flex:1; background:var(--card); padding:20px; border-radius:12px; border:1px solid #2a2a3f;">
            <div style="font-size:12px; color:#666; margin-bottom:5px">Собрано в этом месяце</div>
            <div id="statMonth" style="font-size:24px; font-weight:bold; color:#ffd700">0€</div>
        </div>
        <div style="flex:1; background:var(--card); padding:20px; border-radius:12px; border:1px solid #2a2a3f;">
            <div style="font-size:12px; color:#666; margin-bottom:5px">Общий доход</div>
            <div id="statTotal" style="font-size:24px; font-weight:bold; color:var(--primary)">0€</div>
        </div>
    </div>

   <div style="display:flex; gap:15px; margin-bottom:25px">
        <input id="search" placeholder="Поиск по базе..." style="margin:0" oninput="renderTable()">
        <input id="newName" placeholder="Имя нового участника" style="margin:0; width:250px">
        <button onclick="addDonator()">Добавить</button>
        <button class="secondary" onclick="exportToCSV()" style="margin-left:auto;">Скачать CSV</button>
    </div>


    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>VIP Уровень</th>
                    <th>Участник</th>
                    <th>В этом месяце</th>
                    <th>Всего донатов</th>
                    <th>До цели</th>
                    <th style="text-align:right">Управление</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>

<div id="panel" class="panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px">
        <h3 id="pName">Редактирование</h3>
        <button onclick="closePanel()" class="secondary" style="padding:5px 10px">&times;</button>
    </div>

    <label style="color:#666; font-size:12px">Имя профиля</label>
    <input id="eName" type="text">
    
    <label style="color:#666; font-size:12px">Никнейм (в игре/на стриме)</label>
    <input id="eNick" type="text">
    
    <label style="color:#666; font-size:12px">Telegram / Контакт</label>
    <input id="eTG" type="text">

    <label style="color:#666; font-size:12px">TikTok (ссылка или ник)</label>
    <input id="eTT" type="text">

    <label style="color:#666; font-size:12px">Дата рождения</label>
    <input id="eBD" type="date" style="color-scheme: dark;">
<label style="color:#666; font-size:12px; margin-top:10px; display:block;">Быстрая метка</label>
    <div style="display:flex; gap:5px; margin-top:4px; margin-bottom:12px; flex-wrap:wrap;">
        <div class="tag-btn" onclick="selectTag('💜 любимчик', this)">💜 любимчик</div>
        <div class="tag-btn" onclick="selectTag('⚠️ странный', this)">⚠️ странный</div>
        <div class="tag-btn" onclick="selectTag('🎁 перспективный', this)">🎁 перспективный</div>
        <div class="tag-btn" onclick="selectTag('🧊 холодный', this)">🧊 холодный</div>
        <div class="tag-btn" onclick="selectTag('', this)">✖️ снять</div>
    </div>
    <input type="hidden" id="eTag">
<label style="color:#666; font-size:12px; margin-top:10px; display:block;">Личные заметки</label>
    <textarea id="eNotes" rows="4" placeholder="Например: Любит косплей на Аду Вонг, обещала сигну..." style="width:100%; padding:12px; margin-bottom:12px; margin-top:4px; border-radius:8px; border:1px solid #2a2a3f; background:var(--input); color:white; resize:vertical; font-family:inherit; outline:none;"></textarea>


    <div style="margin-top:20px">
        <label>История по годам:</label>
        <select id="yearSelect" onchange="renderHistoryFields()" style="background:var(--input); color:white; padding:10px; width:100%; border-radius:8px; margin-top:5px"></select>
        <div id="historyFields" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px"></div>
    </div>

    <button onclick="saveData()" style="width:100%; margin-top:30px">Сохранить изменения</button>
    <button onclick="deleteCurrent()" class="danger" style="width:100%; margin-top:10px; background:transparent; color:#666">Удалить донатера</button>
</div>

<script>
const SUPABASE_URL = "https://ltrglnjbsyoelkagqbbh.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0cmdsbmpic3lvZWxrYWdxYmJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNzgyNDksImV4cCI6MjA5MDc1NDI0OX0.VhZiD9OVDfv3nlfYysBNXPsax4RkevErwWImMlqW9BM";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let state = {
    user: null,
    donators: [],
    isLogin: true,
    currentEditId: null
};

const MONTHS = ["Янв","Фев","Мар","Апр","Май","Июн","Июл","Авг","Сен","Окт","Ноя","Дек"];
const getCurKey = () => `${MONTHS[new Date().getMonth()]} ${new Date().getFullYear()}`;

// --- AUTH SYSTEM ---
function toggleAuth() {
    state.isLogin = !state.isLogin;
    document.getElementById('authTitle').innerText = state.isLogin ? "Вход" : "Регистрация";
    document.getElementById('toggleText').innerText = state.isLogin ? "Нет аккаунта? Создать" : "Уже есть аккаунт? Войти";
}

async function handleAuth() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('pass').value;
    showLoading(true);
    
    const { data, error } = state.isLogin 
        ? await db.auth.signInWithPassword({ email, password })
        : await db.auth.signUp({ email, password });

    if (error) alert(error.message);
    showLoading(false);
}

db.auth.onAuthStateChange((event, session) => {
    if (session) {
        state.user = session.user;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('userLabel').innerText = state.user.email;
        initData();
    } else {
        document.getElementById('auth-screen').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
    }
});

function logout() { db.auth.signOut(); }

// --- DATA ENGINE ---
async function initData() {
    showLoading(true);
    const { data, error } = await db.from('donators').select('*').eq('user_id', state.user.id);
    if (!error) state.donators = data;
    renderTable();
    showLoading(false);
}

function renderTable() {
    const q = document.getElementById('search').value.toLowerCase();
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
// --- ПОДСЧЁТ СТАТИСТИКИ ДЛЯ ДАШБОРДА ---
    let totalAllTime = 0;
    let totalThisMonth = 0;
    const currentM = getCurKey();

    state.donators.forEach(d => {
        totalAllTime += d.total || 0;
        totalThisMonth += (d.history || {})[currentM] || 0;
    });

    document.getElementById('statCount').innerText = state.donators.length;
    document.getElementById('statMonth').innerText = totalThisMonth + "€";
    document.getElementById('statTotal').innerText = totalAllTime + "€";
    // --------------------------------------


    const filtered = state.donators
        .filter(d => d.name.toLowerCase().includes(q))
        .sort((a, b) => b.total - a.total);

    filtered.forEach(d => {
        const curMonth = (d.history || {})[getCurKey()] || 0;
        
        // --- ПРОВЕРКА ДНЯ РОЖДЕНИЯ ---
        const isBdaySoon = checkBirthday(d.birthday);
        const nameStyle = isBdaySoon 
            ? 'background: rgba(255, 215, 0, 0.2); color: #ffd700; padding: 4px 8px; border-radius: 6px; border: 1px solid gold; font-weight: bold; display: inline-block;' 
            : '';
        const bdayIcon = isBdaySoon ? ' 🎂' : '';
// Берем только смайлик (первый символ до пробела)
        const tagEmoji = d.tag ? d.tag.split(' ')[0] : '';

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>
                <span style="background:rgba(124,58,237,0.1); color:#a78bfa; padding:4px 8px; border-radius:4px; font-size:12px; font-weight:bold">${getVIP(d.total)}</span>
                <span style="font-size:16px; margin-left:8px; cursor:help;" title="${d.tag}">${tagEmoji}</span>
            </td>
            <td><span style="${nameStyle}">${d.name}${bdayIcon}</span></td>

            <td>${curMonth}€</td>
            <td><strong style="color:var(--primary)">${d.total}€</strong></td>
            <td style="font-size:12px; color:#666">${getNextTarget(d.total)}</td>
            <td style="text-align:right; display:flex; gap:5px; justify-content:flex-end; align-items:center;">
                <button class="secondary" style="padding:6px 10px" onclick="quickAdd('${d.id}', 10)">+10</button>
                <button class="secondary" style="padding:6px 10px" onclick="quickAdd('${d.id}', 30)">+30</button>
                <button class="secondary" style="padding:6px 10px" onclick="quickAdd('${d.id}', 50)">+50</button>
                <button class="secondary" style="padding:6px 10px" onclick="quickAdd('${d.id}', 100)">+100</button>
                
                <div style="display:flex; gap:2px; background:var(--input); padding:2px; border-radius:6px; margin-left:5px; border:1px solid #2a2a3f;">
                    <input type="number" id="custom_${d.id}" placeholder="€" style="width:55px; margin:0; padding:5px; background:transparent; border:none; font-size:12px; text-align:center;">
                    <button onclick="addCustomMoney('${d.id}')" style="background:#333; padding:2px 8px; border-radius:4px; font-size:12px; width:auto;">+</button>
                </div>

                <button class="secondary" style="padding:6px 12px; margin-left:10px" onclick="openPanel('${d.id}')">✎</button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}


async function addDonator() {
    const name = document.getElementById('newName').value;
    if (!name) return;
    showLoading(true);
    const newEntry = { name, total: 0, history: {}, user_id: state.user.id };
    const { data, error } = await db.from('donators').insert([newEntry]).select();
    if (!error) {
        state.donators.push(data[0]);
        document.getElementById('newName').value = '';
        renderTable();
    }
    showLoading(false);
}

async function quickAdd(id, amount) {
    const idx = state.donators.findIndex(d => d.id === id);
    if (idx === -1) return;

    let d = state.donators[idx];
    let key = getCurKey();
    d.history = d.history || {};
    d.history[key] = (d.history[key] || 0) + amount;
    d.total += amount;

    renderTable();
    await db.from('donators').update({ history: d.history, total: d.total }).eq('id', id);
}

// --- PANEL LOGIC ---
function openPanel(id) {
    state.currentEditId = id;
    const d = state.donators.find(x => x.id === id);
    
    document.getElementById('pName').innerText = d.name;
    document.getElementById('eName').value = d.name;
    document.getElementById('eNick').value = d.nick || "";
    document.getElementById('eTG').value = d.telegram || "";
    document.getElementById('eTT').value = d.tiktok || "";
    document.getElementById('eBD').value = d.birthday || "";
document.getElementById('eNotes').value = d.notes || "";

    const ys = document.getElementById('yearSelect');
    ys.innerHTML = [2024, 2025, 2026, 2027].map(y => `<option value="${y}">${y}</option>`).join('');
    ys.value = new Date().getFullYear();
    
    renderHistoryFields();
    document.getElementById('panel').classList.add('open');
}

function renderHistoryFields() {
    const d = state.donators.find(x => x.id === state.currentEditId);
    const year = document.getElementById('yearSelect').value;
    const container = document.getElementById('historyFields');
    
    container.innerHTML = MONTHS.map(m => {
        const key = `${m} ${year}`;
        const val = (d.history || {})[key] || 0;
        return `
            <div style="background:var(--input); padding:8px; border-radius:6px; border: 1px solid #2a2a3f;">
                <div style="font-size:10px; color:#666; margin-bottom:4px">${m}</div>
                <div style="display:flex; align-items:center; gap:4px">
                    <input type="number" step="0.01" min="0" class="h-input" data-key="${key}" value="${val}" 
                           style="margin:0; padding:2px; font-size:14px; border:none; background:transparent; color:white; width:100%; outline:none;">
                    <span style="font-size:14px; color:#666; font-weight:bold">€</span>
                </div>
            </div>
        `;
    }).join('');
}

async function saveData() {
    showLoading(true);
    const d = state.donators.find(x => x.id === state.currentEditId);
    const inputs = document.querySelectorAll('.h-input');
    
    inputs.forEach(i => {
        const val = Math.max(0, parseFloat(i.value) || 0);
        if(val > 0) d.history[i.dataset.key] = val;
        else delete d.history[i.dataset.key];
    });

    d.name = document.getElementById('eName').value;
    d.nick = document.getElementById('eNick').value;
    d.telegram = document.getElementById('eTG').value;
    d.tiktok = document.getElementById('eTT').value;
    d.birthday = document.getElementById('eBD').value;
d.notes = document.getElementById('eNotes').value;
    
    d.total = Object.values(d.history).reduce((a, b) => a + b, 0);

    await db.from('donators').update(d).eq('id', d.id);

    closePanel();
    renderTable();
    showLoading(false);
}

async function deleteCurrent() {
    if (!confirm("Удалить донатера навсегда?")) return;
    showLoading(true);
    await db.from('donators').delete().eq('id', state.currentEditId);
    state.donators = state.donators.filter(x => x.id !== state.currentEditId);
    closePanel();
    renderTable();
    showLoading(false);
}

// --- UTILS ---
function getVIP(t) {
    if (t >= 6000) return "VIP 10 SUPREME";
    if (t >= 4000) return "VIP 9 MYTHIC";
    if (t >= 2500) return "VIP 8 LEGEND";
    if (t >= 1500) return "VIP 7 ROYAL";
    if (t >= 1000) return "VIP 6 ELITE";
    if (t >= 750)  return "VIP 5 DIAMOND";
    if (t >= 500)  return "VIP 4 PLATINUM";
    if (t >= 300)  return "VIP 3 GOLD";
    if (t >= 150)  return "VIP 2 SILVER";
    if (t >= 50)   return "VIP 1 START";
    return "VIP 0 NEW";
}


function getNextTarget(t) {
    const goals = [50, 150, 300, 500, 750, 1000, 1500, 2500, 4000, 6000];
    const next = goals.find(g => g > t);
    return next ? `+${(next - t).toFixed(0)}€ до VIP` : "MAX LEVEL";
}

function showLoading(show) { document.getElementById('loading').style.display = show ? 'block' : 'none'; }
function closePanel() { document.getElementById('panel').classList.remove('open'); }

function addCustomMoney(id) {
    const input = document.getElementById(`custom_${id}`);
    const val = parseFloat(input.value);
    if (val > 0) {
        quickAdd(id, val);
        input.value = '';
    } else {
        alert("Введите число больше 0");
    }
}
// Проверка: скоро ли день рождения (в ближайшие 7 дней)
function checkBirthday(bdayStr) {
    if (!bdayStr) return false;
    
    const today = new Date();
    today.setHours(0, 0, 0, 0); // Обнуляем время для точности
    
    const bday = new Date(bdayStr);
    const currentYear = today.getFullYear();
    
    // Устанавливаем день рождения на текущий год
    bday.setFullYear(currentYear);
    
    // Если день рождения в этом году уже прошел, проверяем следующий год
    if (bday < today) {
        bday.setFullYear(currentYear + 1);
    }
    
    const diffTime = bday - today;
    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
    
    // Возвращаем true, если до ДР от 0 до 7 дней
    return diffDays >= 0 && diffDays <= 7;
}

// --- ЭКСПОРТ В CSV ---
function exportToCSV() {
    if (state.donators.length === 0) {
        alert("База пуста, нечего скачивать!");
        return;
    }

    // 1. Создаем заголовки колонок
    const headers = ["Имя", "Никнейм", "Telegram", "TikTok", "День рождения", "Всего донатов", "Заметки"];
    
    // 2. Собираем данные всех донатеров
    const rows = state.donators.map(d => {
        return [
            `"${(d.name || "").replace(/"/g, '""')}"`,
            `"${(d.nick || "").replace(/"/g, '""')}"`,
            `"${(d.telegram || "").replace(/"/g, '""')}"`,
            `"${(d.tiktok || "").replace(/"/g, '""')}"`,
            `"${(d.birthday || "").replace(/"/g, '""')}"`,
            d.total || 0,
            `"${(d.notes || "").replace(/"/g, '""')}"`
        ].join(",");
    });

    // 3. Склеиваем всё вместе (\uFEFF нужен, чтобы Excel правильно читал русский язык)
    const csvContent = "\uFEFF" + headers.join(",") + "\n" + rows.join("\n");
    
    // 4. Запускаем скачивание файла
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.setAttribute("href", url);
    link.setAttribute("download", `Stellar_CRM_Backup_${new Date().toISOString().slice(0,10)}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

function selectTag(val, btn) {
    document.getElementById('eTag').value = val;
    document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
}

</script>
</body>
</html>
