<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donater CRM</title>

<style>
:root{
  --bg:#0d0b14;
  --card:#171327;
  --accent:#7c3aed;
  --text:#fff;
}

body{margin:0;font-family:sans-serif;background:var(--bg);color:var(--text)}
.container{padding:20px}
.hidden{display:none}
button{background:var(--accent);border:none;color:#fff;padding:6px 10px;border-radius:6px;cursor:pointer}
input,textarea{width:100%;background:#111;border:1px solid #333;color:#fff;padding:6px;border-radius:6px}

/* table */
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #222}
tr:hover{background:#1f1a33}

/* panel */
.panel{position:fixed;top:0;right:-420px;width:420px;height:100%;background:var(--card);transition:.3s;padding:20px;overflow:auto}
.panel.open{right:0}

.month-row{display:flex;gap:5px;margin-bottom:6px;padding:4px;border-radius:6px;align-items:center}
.month-row.active{background:#2b1f5e}
.month-row.has{background:#1f1a33}
.month-row.zero{opacity:.5}
</style>
</head>

<body>

<div id="auth" class="container">
<h2 id="modeTitle">Вход</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Пароль">
<button id="mainBtn">Войти</button>
<button onclick="toggleMode()">Регистрация</button>
<p id="status"></p>
</div>

<div id="app" class="hidden">
<div class="container">
<h1>Donaters</h1>
<button onclick="logout()">Выйти</button>
<button onclick="addUser()">+ Добавить</button>

<table>
<thead>
<tr>
<th>VIP</th>
<th>Ник</th>
<th>Месяц €</th>
<th>Всего €</th>
<th>TG</th>
<th>TikTok</th>
<th>Open</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<div id="panel" class="panel"></div>
</div>

<script>
// ===== AUTH (через Supabase REST без SDK) =====
const SUPABASE_URL = "https://ltrglnjbsyoelkagqbbh.supabase.co";
const API_KEY = "sb_publishable_zYB0aPTJt0yvF_dnejRENQ_jvBSNMQ4";

let session = JSON.parse(localStorage.getItem("session"));

async function authRequest(type,email,password){
  const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "apikey":API_KEY
    },
    body:JSON.stringify({email,password})
  });

  if(!res.ok) throw new Error("Ошибка авторизации");
  return res.json();
}

let isLogin = true;

function toggleMode(){
  isLogin = !isLogin;
  modeTitle.innerText = isLogin?"Вход":"Регистрация";
  mainBtn.innerText = isLogin?"Войти":"Создать аккаунт";
}

mainBtn.onclick = async ()=>{
  try{
    const email = email.value.trim();
    const password = password.value.trim();

    const data = await authRequest(isLogin?"login":"register",email,password);
    localStorage.setItem("session",JSON.stringify(data));
    startApp();
  }catch(e){
    status.innerText = e.message;
  }
}

function logout(){
  localStorage.removeItem("session");
  location.reload();
}

// ===== DATA =====
const VIP = [50,150,300,500,750,1000,1500,2500,4000,6000];
const months = ["Янв","Фев","Мар","Апр","Май","Июн","Июл","Авг","Сен","Окт","Ноя","Дек"];

let data = JSON.parse(localStorage.getItem("donaters")||"[]");

function save(){
  localStorage.setItem("donaters",JSON.stringify(data));
}

function total(u){return u.months.reduce((a,b)=>a+Number(b||0),0)}

function vip(t){
  let lvl=0;
  VIP.forEach((v,i)=>{if(t>=v)lvl=i+1});
  return lvl;
}

function nextVip(t){
  for(let v of VIP){if(t<v)return v-t}
  return 0;
}

function render(){
  data.forEach(u=>{
    u.total=total(u);
    u.vip=vip(u.total);
  });

  data.sort((a,b)=>b.vip-a.vip||b.total-a.total);

  table.innerHTML="";
  const m=new Date().getMonth();

  data.forEach((u,i)=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
    <td>VIP ${u.vip}</td>
    <td>${u.nick||""}</td>
    <td>${u.months[m]||0}</td>
    <td>${u.total}</td>
    <td>${u.telegram||""}</td>
    <td>${u.tiktok||""}</td>
    <td><button onclick="openUser(${i})">Open</button></td>
    `;
    table.appendChild(tr);
  });

  save();
}

function addUser(){
  data.push({nick:"",telegram:"",tiktok:"",birthday:"",cosplay:"",notes:"",months:Array(12).fill(0)});
  render();
}

function openUser(i){
  const u=data[i];
  panel.classList.add("open");

  panel.innerHTML=`
  <h2>${u.nick||"User"}</h2>

  <input placeholder="Ник" value="${u.nick}" onchange="upd(${i},'nick',this.value)">
  <input placeholder="Telegram" value="${u.telegram}" onchange="upd(${i},'telegram',this.value)">
  <input placeholder="TikTok" value="${u.tiktok}" onchange="upd(${i},'tiktok',this.value)">
  <textarea placeholder="Заметки" onchange="upd(${i},'notes',this.value)">${u.notes}</textarea>

  ${months.map((m,mi)=>{
    const val=u.months[mi];
    return `
    <div class="month-row ${mi===new Date().getMonth()?'active':''} ${val>0?'has':'zero'}">
      <span>${m}</span>
      <input type="number" value="${val}" onchange="setM(${i},${mi},this.value)">
      <button onclick="addM(${i},${mi},10)">+10</button>
      <button onclick="addM(${i},${mi},30)">+30</button>
      <button onclick="addM(${i},${mi},50)">+50</button>
      <button onclick="addM(${i},${mi},100)">+100</button>
    </div>`;
  }).join("")}

  <p>Всего: ${u.total}</p>
  <p>VIP: ${u.vip}</p>
  <p>До следующего: ${nextVip(u.total)}</p>

  <button onclick="panel.classList.remove('open')">Закрыть</button>
  `;
}

function upd(i,k,v){data[i][k]=v;render()}
function setM(i,m,v){data[i].months[m]=Number(v);render();openUser(i)}
function addM(i,m,a){data[i].months[m]+=a;render();openUser(i)}

function startApp(){
  auth.classList.add("hidden");
  app.classList.remove("hidden");
  render();
}

if(session) startApp();
</script>

</body>
</html>
