<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<title>Donater CRM Cloud</title>

<style>
:root {
  --bg: #0d0b14;
  --card: #171327;
  --accent: #8b5cf6;
  --text: #fff;
}

body {
  margin: 0;
  font-family: sans-serif;
  background: var(--bg);
  color: var(--text);
}

.container {
  padding: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #222;
}

tr:hover {
  background: #1f1a33;
}

button {
  background: var(--accent);
  border: none;
  padding: 6px 10px;
  color: white;
  cursor: pointer;
  border-radius: 6px;
}

input, textarea {
  width: 100%;
  padding: 6px;
  background: #111;
  border: 1px solid #333;
  color: white;
  border-radius: 6px;
}

.panel {
  position: fixed;
  top: 0;
  right: -420px;
  width: 420px;
  height: 100%;
  background: var(--card);
  transition: 0.3s;
  padding: 20px;
  overflow-y: auto;
}

.panel.open {
  right: 0;
}

.bday-month { background: rgba(255,215,0,0.15); }
.bday-soon { background: rgba(0,255,100,0.2); }
.bday-urgent { background: rgba(255,60,60,0.2); }

.month-row {
  display: flex;
  gap: 5px;
  margin-bottom: 6px;
  align-items: center;
  padding: 4px;
  border-radius: 6px;
}

.month-row.active {
  background: #2b1f5e;
}

.month-row input {
  width: 70px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Donaters</h1>
  <button onclick="addUser()">+ Добавить</button>

  <table>
    <thead>
      <tr>
        <th>VIP</th>
        <th>Ник</th>
        <th>Месяц €</th>
        <th>Всего €</th>
        <th>TG</th>
        <th>TikTok</th>
        <th>Open</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>

<div id="panel" class="panel"></div>

<script>

const SUPABASE_URL = "https://ltrglnjbsyoelkagqbbh.supabase.co"
const SUPABASE_KEY = "sb_publishable_zYB0aPTJt0yvF_dnejRENQ_jvBSNMQ4"

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

const VIP_LEVELS = [50,150,300,500,750,1000,1500,2500,4000,6000];

const months = [
"Янв","Фев","Мар","Апр","Май","Июн",
"Июл","Авг","Сен","Окт","Ноя","Дек"
];

let data = JSON.parse(localStorage.getItem("donaters") || "[]");

function save() {
  localStorage.setItem("donaters", JSON.stringify(data));
}

function calcTotal(user) {
  return user.months.reduce((a,b)=>a+Number(b||0),0);
}

function calcVIP(total) {
  let level = 0;
  VIP_LEVELS.forEach((v,i)=>{
    if(total >= v) level = i+1;
  });
  return level;
}

function nextVIP(total) {
  for(let v of VIP_LEVELS){
    if(total < v) return v - total;
  }
  return 0;
}

function getBirthdayStatus(dateStr) {
  if (!dateStr) return null;

  const today = new Date();
  const parts = dateStr.split("-");
  if (parts.length < 3) return null;

  const month = Number(parts[1]) - 1;
  const day = Number(parts[2]);

  if (month !== today.getMonth()) return null;

  const diff = day - today.getDate();

  if (diff >= 0 && diff <= 3) return "urgent";
  if (diff >= 0 && diff <= 7) return "soon";

  return "month";
}

function render() {
  data.forEach(u=>{
    u.total = calcTotal(u);
    u.vip = calcVIP(u.total);
  });

  data.sort((a,b)=> b.vip - a.vip || b.total - a.total);

  const tbody = document.getElementById("table");
  tbody.innerHTML = "";

  const currentMonth = new Date().getMonth();

  data.forEach((u,i)=>{
    const tr = document.createElement("tr");

    const b = getBirthdayStatus(u.birthday);
    if (b === "month") tr.classList.add("bday-month");
    if (b === "soon") tr.classList.add("bday-soon");
    if (b === "urgent") tr.classList.add("bday-urgent");

    tr.innerHTML = `
      <td>VIP ${u.vip}</td>
      <td>${u.nick || ""}</td>
      <td>${u.months[currentMonth] || 0}</td>
      <td>${u.total}</td>
      <td>${u.telegram || ""}</td>
      <td>${u.tiktok || ""}</td>
      <td><button onclick="openUser(${i})">Open</button></td>
    `;

    tbody.appendChild(tr);
  });

  save();
}

function addUser() {
  data.push({
    name:"",
    nick:"",
    telegram:"",
    tiktok:"",
    birthday:"",
    cosplay:"",
    notes:"",
    months:Array(12).fill(0)
  });
  render();
}

function openUser(index) {
  const u = data[index];
  const panel = document.getElementById("panel");
  const currentMonth = new Date().getMonth();

  panel.classList.add("open");

  panel.innerHTML = `
    <h2>${u.nick || "User"}</h2>

    <input placeholder="Имя" value="${u.name}" onchange="update(${index},'name',this.value)">
    <input placeholder="Ник" value="${u.nick}" onchange="update(${index},'nick',this.value)">
    <input placeholder="Telegram" value="${u.telegram}" onchange="update(${index},'telegram',this.value)">
    <input placeholder="TikTok" value="${u.tiktok}" onchange="update(${index},'tiktok',this.value)">
    <input type="date" value="${u.birthday}" onchange="update(${index},'birthday',this.value)">
    <input placeholder="Косплей" value="${u.cosplay}" onchange="update(${index},'cosplay',this.value)">
    <textarea placeholder="Заметки" onchange="update(${index},'notes',this.value)">${u.notes}</textarea>

    <h3>Донаты</h3>

    ${months.map((m,i)=>`
      <div class="month-row ${i===currentMonth?'active':''}">
        <span>${m}</span>
        <input type="number" value="${u.months[i]}" onchange="setMonth(${index},${i},this.value)">
        <button onclick="addMoney(${index},${i},10)">+10</button>
        <button onclick="addMoney(${index},${i},30)">+30</button>
        <button onclick="addMoney(${index},${i},50)">+50</button>
        <button onclick="addMoney(${index},${i},100)">+100</button>
      </div>
    `).join("")}

    <p>Всего: ${calcTotal(u)} €</p>
    <p>VIP: ${calcVIP(calcTotal(u))}</p>
    <p>До следующего: ${nextVIP(calcTotal(u))} €</p>

    <button onclick="closePanel()">Закрыть</button>
  `;
}

function closePanel() {
  document.getElementById("panel").classList.remove("open");
}

function update(i,key,val){
  data[i][key] = val;
  render();
}

function setMonth(i,m,val){
  data[i].months[m] = Number(val);
  render();
  openUser(i);
}

function addMoney(i,m,amount){
  data[i].months[m] += amount;
  render();
  openUser(i);
}

render();

</script>
</body>
</html>
