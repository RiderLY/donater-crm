<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar CRM 2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #7c3aed; --bg: #0f0f14; --card: #181825; --input: #232336; --text: #eee; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); }
        
        /* Auth & Layout */
        .flex-center { height: 100vh; display: flex; justify-content: center; align-items: center; }
        .box { background: var(--card); padding: 30px; border-radius: 16px; width: 340px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        input, select { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid transparent; background: var(--input); color: white; transition: 0.2s; }
        input:focus { border-color: var(--primary); outline: none; }
        button { width: 100%; padding: 12px; background: var(--primary); border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: 600; }
        button:hover { opacity: 0.9; }
        button:disabled { background: #444; cursor: not-allowed; }

        .app { display: none; padding: 30px; max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        /* Таблица */
        .table-container { background: var(--card); border-radius: 12px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; background: rgba(255,255,255,0.05); color: #aaa; font-size: 13px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #2a2a3f; }
        tr:hover { background: rgba(255,255,255,0.02); }

        /* Панель */
        .panel { position: fixed; right: -400px; top: 0; width: 380px; height: 100%; background: #111; padding: 25px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: -10px 0 30px rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto; }
        .panel.open { right: 0; }
        .history-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .history-item { background: var(--input); padding: 8px; border-radius: 6px; }
    </style>
</head>
<body>

<div id="auth" class="flex-center">
    <div class="box">
        <h2 id="authTitle" style="margin-bottom: 20px; text-align: center;">Stellar CRM</h2>
        <input id="email" type="email" placeholder="Email">
        <input id="password" type="password" placeholder="Пароль">
        <button id="authBtn" onclick="handleAuth()">Войти</button>
        <p onclick="toggleMode()" style="text-align:center; margin-top:15px; font-size:13px; color:#aaa; cursor:pointer;">Сменить режим (Вход/Регистрация)</p>
    </div>
</div>

<div id="app" class="app">
    <header>
        <h2>Дашборд донатов</h2>
        <button onclick="logout()" style="width: auto; padding: 8px 16px; background: #333;">Выйти</button>
    </header>

    <div style="display: grid; grid-template-columns: 1fr 300px; gap: 15px; margin-bottom: 20px;">
        <input id="search" placeholder="Поиск по имени..." oninput="loadData()" style="margin:0">
        <div style="display: flex; gap: 8px;">
            <input id="newName" placeholder="Новый донатер" style="margin:0">
            <button onclick="addDonator()" style="width: auto;">+</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Уровень</th>
                    <th>Имя</th>
                    <th>Месяц</th>
                    <th>Всего</th>
                    <th>Цель</th>
                    <th style="text-align: right;">Действия</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>

<div id="panel" class="panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3 id="pName">Редактирование</h3>
        <button onclick="closePanel()" style="width:auto; background:none; font-size:24px;">&times;</button>
    </div>
    
    <label>Имя</label><input id="eName">
    <label>Никнейм</label><input id="eNick">
    <label>Telegram</label><input id="eTG">
    
    <div style="margin-top:20px;">
        <label>История (выберите год):</label>
        <select id="yearSelect" onchange="renderHistoryInputs()"></select>
        <div id="historyGrid" class="history-grid"></div>
    </div>

    <button onclick="saveData()" style="margin-top: 30px;">Сохранить изменения</button>
</div>

<script>
const SUPABASE_URL = "https://ltrglnjbsyoelkagqbbh.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0cmdsbmpic3lvZWxrYWdxYmJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNzgyNDksImV4cCI6MjA5MDc1NDI0OX0.VhZiD9OVDfv3nlfYysBNXPsax4RkevErwWImMlqW9BM";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let isLogin = true, currentId = null, currentUser = null, currentData = null;
const MONTHS_LIST = ["Янв","Фев","Мар","Апр","Май","Июн","Июл","Авг","Сен","Окт","Ноя","Дек"];
const getMonthKey = () => { const d = new Date(); return `${MONTHS_LIST[d.getMonth()]} ${d.getFullYear()}`; };

// AUTH LOGIC
async function handleAuth() {
    const email = document.getElementById("email").value, password = document.getElementById("password").value;
    const btn = document.getElementById("authBtn");
    btn.disabled = true; btn.innerText = "Загрузка...";

    const { data, error } = isLogin 
        ? await db.auth.signInWithPassword({ email, password })
        : await db.auth.signUp({ email, password });

    if (error) { alert(error.message); btn.disabled = false; btn.innerText = "Ошибка"; }
    else { checkUser(); }
}

async function checkUser() {
    const { data: { user } } = await db.auth.getUser();
    if (user) {
        currentUser = user;
        document.getElementById("auth").style.display = "none";
        document.getElementById("app").style.display = "block";
        loadData();
    }
}
function toggleMode() { isLogin = !isLogin; document.getElementById("authTitle").innerText = isLogin ? "Вход" : "Регистрация"; }
function logout() { db.auth.signOut().then(() => location.reload()); }
checkUser();

// CORE LOGIC
function getVIP(total) {
    const t = total || 0;
    if(t >= 6000) return "10 (Supreme)";
    if(t >= 4000) return "9 (Mythic)";
    if(t >= 2500) return "8 (Legend)";
    if(t >= 1500) return "7 (Royal)";
    if(t >= 1000) return "6 (Elite)";
    if(t >= 750) return "5 (Diamond)";
    if(t >= 500) return "4 (Platinum)";
    if(t >= 300) return "3 (Gold)";
    if(t >= 150) return "2 (Silver)";
    return t >= 50 ? "1 (Старт)" : "0";
}

function getNextTarget(total) {
    const t = total || 0;
    const levels = [50, 150, 300, 500, 750, 1000, 1500, 2500, 4000, 6000];
    const next = levels.find(l => l > t);
    return next ? (next - t) + "€" : "MAX";
}

async function loadData() {
    const q = document.getElementById("search").value.toLowerCase();
    // ФИЛЬТР ПО USER_ID (Та самая защита!)
    const { data, error } = await db.from("donators").select("*").eq("user_id", currentUser.id);
    
    if (error) return console.error(error);
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    data.filter(d => d.name.toLowerCase().includes(q)).sort((a,b) => b.total - a.total).forEach(d => {
        const curM = (d.history || {})[getMonthKey()] || 0;
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td><b>${getVIP(d.total)}</b></td>
            <td>${d.name}</td>
            <td>${curM}€</td>
            <td>${d.total}€</td>
            <td style="color:#888">${getNextTarget(d.total)}</td>
            <td style="text-align:right">
                <button onclick="quickAdd('${d.id}', 10)" style="width:auto; padding:5px 10px; margin-right:5px">+10</button>
                <button onclick="openPanel('${d.id}')" style="width:auto; padding:5px 10px; background:#444">✎</button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

async function addDonator() {
    const name = document.getElementById("newName").value;
    if(!name) return;
    await db.from("donators").insert([{ name, total:0, history:{}, user_id: currentUser.id }]);
    document.getElementById("newName").value = "";
    loadData();
}

async function quickAdd(id, amt) {
    const { data } = await db.from("donators").select("*").eq("id", id).single();
    let hist = data.history || {}, key = getMonthKey();
    hist[key] = (hist[key] || 0) + amt;
    await db.from("donators").update({ history: hist, total: (data.total + amt) }).eq("id", id);
    loadData();
}

// PANEL LOGIC
function openPanel(id) {
    currentId = id;
    db.from("donators").select("*").eq("id", id).single().then(({data}) => {
        currentData = data;
        document.getElementById("pName").innerText = data.name;
        document.getElementById("eName").value = data.name;
        document.getElementById("eNick").value = data.nick || "";
        document.getElementById("eTG").value = data.telegram || "";
        
        const ys = document.getElementById("yearSelect");
        ys.innerHTML = [2024, 2025, 2026, 2027].map(y => `<option value="${y}">${y}</option>`).join("");
        ys.value = new Date().getFullYear();
        
        renderHistoryInputs();
        document.getElementById("panel").classList.add("open");
    });
}

function renderHistoryInputs() {
    const year = document.getElementById("yearSelect").value;
    const grid = document.getElementById("historyGrid");
    grid.innerHTML = MONTHS_LIST.map(m => {
        const key = `${m} ${year}`;
        const val = (currentData.history || {})[key] || 0;
        return `<div class="history-item">
            <span style="font-size:11px; color:#aaa">${m}</span>
            <input type="number" class="h-input" data-key="${key}" value="${val}" style="margin:0; padding:5px; font-size:12px;">
        </div>`;
    }).join("");
}

async function saveData() {
    const hInputs = document.querySelectorAll(".h-input");
    let newHist = currentData.history || {}, newTot = 0;
    
    // Обновляем текущий год из инпутов
    hInputs.forEach(i => {
        const v = parseFloat(i.value) || 0;
        if(v > 0) newHist[i.dataset.key] = v;
        else delete newHist[i.dataset.key];
    });

    // Пересчитываем ВСЁ (Защита от битых данных)
    newTot = Object.values(newHist).reduce((acc, curr) => acc + curr, 0);

    await db.from("donators").update({
        name: document.getElementById("eName").value,
        nick: document.getElementById("eNick").value,
        telegram: document.getElementById("eTG").value,
        history: newHist,
        total: newTot
    }).eq("id", currentId);

    closePanel();
    loadData();
}

function closePanel() { document.getElementById("panel").classList.remove("open"); }
</script>
</body>
</html>
