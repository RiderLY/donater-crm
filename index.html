<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Donater CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body { font-family: Arial; background:#0f0f14; color:white; text-align:center; }
.box { margin:20px auto; padding:20px; max-width:400px; background:#1c1c24; border-radius:12px; }
input, button { margin:10px; padding:10px; border-radius:8px; border:none; }
button { background:#6c5cff; color:white; cursor:pointer; }
.hidden { display:none; }
</style>
</head>
<body>

<h1>Donater CRM</h1>

<div id="auth" class="box">
  <h2 id="authTitle">Вход</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Пароль">

  <button id="mainBtn">Войти</button>
  <br>
  <button onclick="toggleMode()">Переключить на регистрацию</button>

  <p id="status"></p>
</div>

<div id="app" class="box hidden">
  <h2>Ты вошла 🎉</h2>
  <button onclick="logout()">Выйти</button>
</div>

<script>
const SUPABASE_URL = "https://ltrglnjbsyoelkagqbbh.supabase.co";
const SUPABASE_KEY = "sb_publishable_zYB0aPTJt0yvF_dnejRENQ_jvBSNMQ4";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let isLogin = true;

const emailEl = document.getElementById('email');
const passEl = document.getElementById('password');
const statusEl = document.getElementById('status');
const titleEl = document.getElementById('authTitle');
const btn = document.getElementById('mainBtn');

function toggleMode(){
  isLogin = !isLogin;
  titleEl.innerText = isLogin ? 'Вход' : 'Регистрация';
  btn.innerText = isLogin ? 'Войти' : 'Зарегистрироваться';
}

btn.onclick = async () => {
  const email = emailEl.value;
  const password = passEl.value;

  if(!email || !password){
    statusEl.innerText = 'Заполни поля';
    return;
  }

  if(isLogin){
    const { data, error } = await supabase.auth.signInWithPassword({email,password});

    if(error){
      statusEl.innerText = error.message;
      return;
    }

    successLogin(data.user);

  } else {
    const { data, error } = await supabase.auth.signUp({email,password});

    if(error){
      statusEl.innerText = error.message;
      return;
    }

    // сразу логиним после регистрации
    const res = await supabase.auth.signInWithPassword({email,password});

    if(res.error){
      statusEl.innerText = res.error.message;
      return;
    }

    successLogin(res.data.user);
  }
};

function successLogin(user){
  document.getElementById('auth').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
}

async function logout(){
  await supabase.auth.signOut();
  location.reload();
}

// восстановление сессии
(async ()=>{
  const { data } = await supabase.auth.getSession();
  if(data.session?.user){
    successLogin(data.session.user);
  }
})();
</script>

</body>
</html>
