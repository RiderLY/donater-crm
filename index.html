<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donators CRM</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: system-ui;
}

body {
    background: #0f0f14;
    color: white;
}

/* AUTH */

.auth-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.auth-box {
    background: #181825;
    padding: 30px;
    border-radius: 16px;
    width: 320px;
}

.auth-box h2 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: none;
    background: #232336;
    color: white;
}

button {
    width: 100%;
    padding: 10px;
    background: #7c3aed;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    opacity: 0.8;
}

.toggle {
    margin-top: 10px;
    text-align: center;
    cursor: pointer;
    color: #aaa;
}

/* APP */

.app {
    display: none;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

.logout {
    width: auto;
    padding: 8px 16px;
}

/* TABLE */

table {
    width: 100%;
    border-collapse: collapse;
    background: #181825;
    border-radius: 12px;
    overflow: hidden;
}

th, td {
    padding: 12px;
    text-align: left;
}

th {
    background: #1f1f2e;
}

tr {
    border-bottom: 1px solid #2a2a3f;
}

tr:hover {
    background: #22223a;
}

.vip {
    color: #a78bfa;
    font-weight: bold;
}

.open-btn {
    padding: 6px 10px;
    font-size: 12px;
}

</style>
</head>
<body>

<div class="auth-container" id="auth">
    <div class="auth-box">
        <h2 id="authTitle">Вход</h2>

        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Пароль">

        <button onclick="handleAuth()">Продолжить</button>

        <div class="toggle" onclick="toggleMode()">
            Нет аккаунта? Регистрация
        </div>
    </div>
</div>

<div class="app" id="app">
    <div class="header">
        <h2>Donators CRM</h2>
        <button class="logout" onclick="logout()">Выйти</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>VIP</th>
                <th>Имя</th>
                <th>Месяц (€)</th>
                <th>Всего (€)</th>
                <th>Telegram</th>
                <th>TikTok</th>
                <th>ДР</th>
                <th>Косплей</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>

// 🔑 ВСТАВЬ СВОИ ДАННЫЕ
const SUPABASE_URL = "YOUR_URL";
const SUPABASE_ANON_KEY = "YOUR_KEY";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let isLogin = true;

// ================= AUTH =================

function toggleMode() {
    isLogin = !isLogin;
    document.getElementById("authTitle").innerText = isLogin ? "Вход" : "Регистрация";
    document.querySelector(".toggle").innerText = isLogin 
        ? "Нет аккаунта? Регистрация"
        : "Уже есть аккаунт? Вход";
}

async function handleAuth() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;


    if (!email || !password) return alert("Заполни поля");

    if (isLogin) {
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) return alert(error.message);
    } else {
        const { error } = await supabase.auth.signUp({ email, password });
        if (error) return alert(error.message);
        alert("Проверь почту для подтверждения");
    }

    checkUser();
}

async function logout() {
    await supabase.auth.signOut();
    location.reload();
}

async function checkUser() {
    const { data } = await supabase.auth.getUser();

    if (data.user) {
        document.getElementById("auth").style.display = "none";
        document.getElementById("app").style.display = "block";
        loadDonators();
    }
}

checkUser();

// ================= DATA =================

function getVIP(total) {
    const levels = [50,150,300,500,750,1000,1500,2500,4000,6000];
    let vip = 0;

    for (let i = 0; i < levels.length; i++) {
        if (total >= levels[i]) vip = i + 1;
    }

    return vip;
}

// ================= TABLE =================

async function loadDonators() {

    const { data, error } = await supabase
        .from("donators")
        .select("*");

    if (error) {
        console.log(error);
        return;
    }

    renderTable(data);
}

function renderTable(data) {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    data.sort((a, b) => {
        const vipA = getVIP(a.total || 0);
        const vipB = getVIP(b.total || 0);

        if (vipB !== vipA) return vipB - vipA;
        return (b.total || 0) - (a.total || 0);
    });

    data.forEach(d => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td class="vip">VIP ${getVIP(d.total || 0)}</td>
            <td>${d.name || "-"}</td>
            <td>${d.month || 0}</td>
            <td>${d.total || 0}</td>
            <td>${d.telegram ? `<a href="${d.telegram}" target="_blank">link</a>` : "-"}</td>
            <td>${d.tiktok ? `<a href="${d.tiktok}" target="_blank">link</a>` : "-"}</td>
            <td>${d.birthday || "-"}</td>
            <td>${d.cosplay || "-"}</td>
            <td><button class="open-btn">Open</button></td>
        `;

        tbody.appendChild(tr);
    });
}

</script>

</body>
</html>
